<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Convertisseur CPR/XPR → CRO</title>
<style>
body { font-family:sans-serif; margin:2em; }
#dropzone { border:2px dashed #666; padding:3em; text-align:center; margin-bottom:1em; cursor:pointer; }
#dropzone.dragover { border-color:#09f; background:#eef; }
pre { background:#f5f5f5; padding:1em; border:1px solid #ccc; white-space:pre-wrap; }
.rom { display:block; margin:2px 0; padding:0.2em 0.5em; border-radius:4px; }
.ROM_LOW { background:#ffcccc; }
.ROM_HIGH { background:#cce5ff; }
.ROM_BANKABLE { background:#ccffcc; }
</style>
</head>
<body>
<h1>Convertisseur CPR/XPR → CRO</h1>
<div id="dropzone">Déposez un fichier CPR ou XPR ici</div>
<pre id="info">Aucune ROM chargée</pre>
<button id="export" disabled>Télécharger le CRO</button>

<script>
let croBuffer=null;
let croFileName="converted.cro";
let romsDisplay=[];

/******** RIFF Helper ********/
function readFourCC(view,offset){ return String.fromCharCode(view.getUint8(offset),view.getUint8(offset+1),view.getUint8(offset+2),view.getUint8(offset+3)); }
function parseRIFF(buffer){
    const view=new DataView(buffer);
    if(readFourCC(view,0)!="RIFF") throw "Pas un fichier RIFF";
    const formType = readFourCC(view,8);
    let offset=12, chunks=[];
    while(offset<buffer.byteLength){
        const id=readFourCC(view,offset);
        const size=view.getUint32(offset+4,true);
        const dataOffset=offset+8;
        chunks.push({id,size,data:buffer.slice(dataOffset,dataOffset+size)});
        offset = dataOffset+size+(size&1);
    }
    return { formType, chunks };
}
function parseCartridge(riff){
    let nbbk=null, roms=[];
    for(const c of riff.chunks){
        if(c.id=="NBBK") nbbk = new DataView(c.data).getUint16(0,true);
        if(c.id.startsWith("cb")) roms.push({num:parseInt(c.id.substring(2),10), data:c.data});
    }
    return { type: riff.formType, nbbk, roms };
}

/******** Génération CRO ********/
function writeUint32LE(buf, offset, value){ buf[offset]=value&0xFF; buf[offset+1]=(value>>8)&0xFF; buf[offset+2]=(value>>16)&0xFF; buf[offset+3]=(value>>24)&0xFF; }
function encodeChunk(id,data){
    const size=data.byteLength;
    const padding = size&1?1:0;
    const buf = new Uint8Array(8+size+padding);
    for(let i=0;i<4;i++) buf[i]=id.charCodeAt(i);
    writeUint32LE(buf,4,size);
    buf.set(new Uint8Array(data),8);
    if(padding) buf[buf.length-1]=0;
    return buf;
}
function encodeROM(rom){
    const chunks=[];
    chunks.push(encodeChunk("RID ",new TextEncoder().encode(rom.rid)));
    const rtypBuf = new Uint8Array(4); writeUint32LE(rtypBuf,0,rom.rtyp); chunks.push(encodeChunk("RTYP",rtypBuf));
    chunks.push(encodeChunk("RLOG",new Uint8Array([rom.rlog])));
    chunks.push(encodeChunk("RPHY",new Uint8Array([rom.rphy])));
    chunks.push(encodeChunk("RDT ", rom.rdt));
    let total=0; chunks.forEach(c=>total+=c.byteLength);
    const data=new Uint8Array(total); let off=0; chunks.forEach(c=>{ data.set(c,off); off+=c.byteLength; });
    return encodeChunk("ROM ",data);
}
function encodeGRRO(grro){
    const romChunks = grro.roms.map(encodeROM);
    let len=0; romChunks.forEach(c=>len+=c.byteLength);
    const buf = new Uint8Array(len); let off=0; romChunks.forEach(c=>{ buf.set(c,off); off+=c.byteLength; });
    const gnumBuf = new Uint8Array(4); writeUint32LE(gnumBuf,0,grro.gnum);
    const gnumChunk = encodeChunk("GNUM",gnumBuf);
    const glblChunk = encodeChunk("GLBL",new TextEncoder().encode(grro.glbl));
    const grroContent = new Uint8Array(gnumChunk.byteLength + glblChunk.byteLength + buf.byteLength);
    grroContent.set(gnumChunk,0); grroContent.set(glblChunk,gnumChunk.byteLength); grroContent.set(buf,gnumChunk.byteLength+glblChunk.byteLength);
    return encodeChunk("GRRO",grroContent);
}
function createCRO(parsed){
    const groups=[];
    const nbbk = parsed.nbbk || parsed.roms.length;
    const numGroups=Math.ceil(parsed.roms.length/nbbk);
    for(let i=0;i<numGroups;i++){
        const grro={ gnum:i, glbl:`Group ${i}`, roms:[] };
        const start=i*nbbk, end=Math.min((i+1)*nbbk, parsed.roms.length);
        for(let j=start;j<end;j++){
            const r = parsed.roms[j];
            let rlog;
            if(parsed.type==="AMS!" && r.num===3) rlog=7;
            else if(parsed.type==="AMS!") rlog=1;
            else rlog=r.num;
            // Définir type pour affichage couleurs
            let rtyp = (rlog===0?0:(rlog===7?1:2)); // simple logique pour demo
            grro.roms.push({ rid:`cb${String(r.num).padStart(2,'0')}`, rtyp, rlog, rphy:r.num, rdt:r.data });
        }
        groups.push(grro);
    }
    romsDisplay=[];
    groups.forEach(gr=>{
        gr.roms.forEach(r=> romsDisplay.push(r));
    });
    const grroChunks=groups.map(encodeGRRO);
    let total=0; grroChunks.forEach(c=>total+=c.byteLength);
    const allBuf=new Uint8Array(total); let off=0; grroChunks.forEach(c=>{ allBuf.set(c,off); off+=c.byteLength; });
    const riffBuf=new Uint8Array(12+allBuf.byteLength);
    riffBuf.set([82,73,70,70],0); writeUint32LE(riffBuf,4,allBuf.byteLength+4);
    riffBuf.set([67,82,79,32],8); riffBuf.set(allBuf,12);
    return riffBuf.buffer;
}

/******** UI ********/
const dropzone=document.getElementById("dropzone");
const info=document.getElementById("info");
const exportBtn=document.getElementById("export");

function renderROMs(){
    if(romsDisplay.length===0) return;
    info.innerHTML="";
    romsDisplay.forEach(r=>{
        const div = document.createElement("div");
        div.className="rom "+(r.rtyp===0?"ROM_LOW":r.rtyp===1?"ROM_HIGH":"ROM_BANKABLE");
        div.textContent=`Nom: ${r.rid}, Log: ${r.rlog}, Phys: ${r.rphy}, Taille: ${r.rdt.byteLength} octets`;
        info.appendChild(div);
    });
}

dropzone.addEventListener("dragover", e=>{ e.preventDefault(); dropzone.classList.add("dragover"); });
dropzone.addEventListener("dragleave", e=>{ dropzone.classList.remove("dragover"); });
dropzone.addEventListener("drop", e=>{
    e.preventDefault(); dropzone.classList.remove("dragover");
    const file = e.dataTransfer.files[0]; if(!file) return;
    croFileName=file.name.replace(/\.(cpr|xpr)$/i,".cro");
    const reader = new FileReader();
    reader.onload = ()=>{
        try{
            const buffer = reader.result;
            const riff=parseRIFF(buffer);
            const parsed=parseCartridge(riff);
            croBuffer=createCRO(parsed);
            renderROMs();
            exportBtn.disabled=false;
        }catch(ex){ info.textContent="Erreur: "+ex; exportBtn.disabled=true; }
    };
    reader.readAsArrayBuffer(file);
});

exportBtn.addEventListener("click", ()=>{
    if(!croBuffer) return;
    const blob=new Blob([croBuffer],{type:"application/octet-stream"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=croFileName;
    a.click();
});
</script>
</body>
</html>
