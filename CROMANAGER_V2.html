<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRO MANAGER</title>
<style>
body { font-family: sans-serif; margin: 20px; }
h1,h2 { margin-top: 1em; }

.dropzone {
  border: 2px dashed #666;
  padding: 20px;
  text-align: center;
  margin-bottom: 1em;
}
.dropzone.dragover { background: #eef; border-color: #09f; }

.group { border: 1px solid #999; padding: 10px; margin-bottom: 10px; }
.group.selected { border: 2px solid #09f; }

.group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}

.rom {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px;
  margin: 2px 0;
  font-size: 1.2em;
}

.rom-name {
  font-family: monospace;
  font-weight: bold;
  min-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.rom-controls { font-size: 0.9em; display: flex; gap: 4px; }
.rom-type { min-width: 120px; }
.rom-log  { min-width: 70px; }
.rom-phy  { min-width: 70px; }

.rom-size {
  font-size: 0.9em;
  min-width: 150px;
  text-align: right;
}

.ROM_LOW { background:#ffcccc; }
.ROM_HIGH { background:#cce5ff; }
.ROM_BANKABLE { background:#ccffcc; }
.ROM_MF2 { background:#ffcc99; }

button.danger { color: darkred; }
</style>
</head>
<body>

<h1>CRO MANAGER</h1>

<div id="dropImport" class="dropzone">
  Déposez ici un fichier CPR / XPR / CRO
</div>

<button onclick="addGroup()">Ajouter un GRRO</button>
<input id="exportName" style="margin-left:10px;width:200px">
<button onclick="exportCRO()" id="exportBtn" disabled>Exporter .CRO</button>

<h2>Groupes</h2>
<div id="groups"></div>

<h2>Ajout de ROM binaires</h2>
<div id="dropROM" class="dropzone">
  Déposez ici des fichiers ROM (dans le GRRO sélectionné)
</div>

<script>
let groups = [];
let selectedGroupIndex = null;
const exportNameInput = document.getElementById("exportName");

window.onload = () => exportNameInput.value = "ExportCRO";

/* ================= UTIL ================= */

function readU16(arr, o){ return arr[o] | (arr[o+1]<<8); }
function readU32(arr, o){ return arr[o] | (arr[o+1]<<8) | (arr[o+2]<<16) | (arr[o+3]<<24); }

/* ================= UI ================= */

function renderGroups(){
  const c = document.getElementById("groups");
  c.innerHTML = "";

  groups.forEach((g,gi)=>{
    const gd = document.createElement("div");
    gd.className = "group"+(gi===selectedGroupIndex?" selected":"");

    const h = document.createElement("div");
    h.className = "group-header";
    h.onclick = ()=>{ selectedGroupIndex=gi; renderGroups(); };

    const num = document.createElement("input");
    num.type="number"; num.value=g.gnum;
    num.onchange=e=>g.gnum=e.target.valueAsNumber;

    const lbl = document.createElement("input");
    lbl.value=g.glbl; lbl.style.minWidth="200px";
    lbl.onclick=e=>e.stopPropagation();
    lbl.oninput=e=>g.glbl=e.target.value;

    const del = document.createElement("button");
    del.textContent="🗑"; del.className="danger";
    del.onclick=e=>{ e.stopPropagation(); deleteGroup(gi); };

    h.append("GRRO #",num,lbl,del);
    gd.appendChild(h);

    g.roms.forEach((r,ri)=>{
      const rd=document.createElement("div");
      rd.className="rom "+(
        r.rtyp===0?"ROM_LOW":
        r.rtyp===1?"ROM_HIGH":
        r.rtyp===2?"ROM_BANKABLE":"ROM_MF2"
      );

      const nm=document.createElement("div");
      nm.className="rom-name"; nm.textContent=r.rid;

      const sel=document.createElement("select");
      ["LOW","HIGH","BANKABLE","MF2"].forEach((t,i)=>{
        const o=document.createElement("option");
        o.value=i; o.text=t; sel.appendChild(o);
      });
      sel.value=r.rtyp;
      sel.onchange=()=>{
        r.rtyp=+sel.value; renderGroups();
      };

      const log=document.createElement("input");
      log.type="number"; log.value=r.rlog;
      log.onchange=e=>r.rlog=e.target.valueAsNumber;

      const phy=document.createElement("input");
      phy.type="number"; phy.value=r.rphy;
      phy.onchange=e=>r.rphy=e.target.valueAsNumber;

      const sz=document.createElement("div");
      sz.className="rom-size";
      sz.textContent=r.rdt.length+" octets";

      const delr=document.createElement("button");
      delr.textContent="🗑"; delr.className="danger";
      delr.onclick=()=>{ g.roms.splice(ri,1); renderGroups(); };

      rd.append(
        nm,
        wrap("Type:",sel,"rom-type"),
        wrap("Log:",log,"rom-log"),
        wrap("Phy:",phy,"rom-phy"),
        sz,delr
      );
      gd.appendChild(rd);
    });

    c.appendChild(gd);
  });

  document.getElementById("exportBtn").disabled=!groups.length;
}

function wrap(lbl,el,cls){
  const d=document.createElement("div");
  d.className="rom-controls "+cls;
  d.append(lbl,el);
  return d;
}

/* ================= GROUP ================= */

function addGroup(name="Nouveau groupe"){
  groups.push({ gnum:groups.length, glbl:name, roms:[] });
  selectedGroupIndex=groups.length-1;
  renderGroups();
}
function deleteGroup(i){
  if(!confirm("Supprimer ce GRRO ?"))return;
  groups.splice(i,1);
  selectedGroupIndex=null;
  renderGroups();
}

/* ================= DROP ROM ================= */

dropROM.ondragover=e=>{e.preventDefault();dropROM.classList.add("dragover");};
dropROM.ondragleave=()=>dropROM.classList.remove("dragover");
dropROM.ondrop=e=>{
  e.preventDefault();dropROM.classList.remove("dragover");
  if(selectedGroupIndex==null)return alert("Sélectionnez un GRRO");
  [...e.dataTransfer.files].forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{
      groups[selectedGroupIndex].roms.push({
        rid:f.name,rtyp:1,rlog:1,rphy:0,rdt:new Uint8Array(r.result)
      });
      renderGroups();
    };
    r.readAsArrayBuffer(f);
  });
};

/* ================= IMPORT CPR / XPR / CRO ================= */

dropImport.ondragover=e=>{e.preventDefault();dropImport.classList.add("dragover");};
dropImport.ondragleave=()=>dropImport.classList.remove("dragover");
dropImport.ondrop=e=>{
  e.preventDefault();dropImport.classList.remove("dragover");

  [...e.dataTransfer.files].forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{
      const a=new Uint8Array(r.result);
      const sig=String.fromCharCode(...a.slice(8,12));
      exportNameInput.value=f.name.replace(/\.[^.]+$/,"");

      /* ===== CPR ===== */
      if(sig==="AMS!"){
        addGroup(f.name);
        const g=groups[selectedGroupIndex];
        for(let i=0;i<32;i++){
          const tag="cb"+String(i).padStart(2,"0");
          const idx=scan(a,tag);
          if(idx>=0){
            const sz=readU32(a,idx+4);
            const data=a.slice(idx+8,idx+8+sz);
            g.roms.push({
              rid:tag,
              rtyp:i<8?2:1,
              rlog:i===3?7:1,
              rphy:i,
              rdt:data
            });
          }
        }
      }

      /* ===== XPR ===== */
      else if(sig==="CXME"){
        let pos=12,nbbk=null,cx=[];
        while(pos<a.length){
          const id=String.fromCharCode(...a.slice(pos,pos+4));
          const sz=readU32(a,pos+4);
          if(id==="NBBK") nbbk=readU16(a,pos+8);
          else if(a[pos]===0x43 && a[pos+1]===0x58){
            cx.push({
              n:readU16(a,pos+2),
              d:a.slice(pos+8,pos+8+sz)
            });
          }
          pos+=8+sz+(sz&1);
        }
        if(nbbk==null) return alert("XPR sans NBBK");
        cx.sort((x,y)=>x.n-y.n);

        let g=null,c=0;
        cx.forEach(x=>{
          if(!g||c>=nbbk){
            addGroup("XPR Group "+groups.length);
            g=groups[selectedGroupIndex];
            c=0;
          }
          g.roms.push({
            rid:"CX"+x.n,
            rtyp:x.n<8?2:1,
            rlog:x.n===3?7:1,
            rphy:x.n,
            rdt:x.d
          });
          c++;
        });
      }

      /* ===== CRO ===== */
      else if(sig==="CRO "){
        let p=12;
        while(p<a.length){
          if(String.fromCharCode(...a.slice(p,p+4))==="GRRO"){
            addGroup("GRRO");
          }
          p+=8+readU32(a,p+4);
        }
      }
      else alert("Format non supporté");

      renderGroups();
    };
    r.readAsArrayBuffer(f);
  });
};

function scan(a,s){
  const t=[...s].map(c=>c.charCodeAt(0));
  for(let i=0;i<a.length-t.length;i++){
    if(t.every((v,j)=>a[i+j]===v)) return i;
  }
  return -1;
}

/* ================= EXPORT CRO ================= */

function exportCRO(){
  const out=[];
  const w=s=>[...s].forEach(c=>out.push(c.charCodeAt(0)));
  const u=v=>out.push(v&255,v>>8&255,v>>16&255,v>>24&255);

  w("RIFF");u(0);w("CRO ");
  groups.forEach(g=>{
    w("GRRO");const L=out.length;u(0);
    w("GLBL");w(g.glbl);
    w("GNUM");u(g.gnum);
    g.roms.forEach(r=>{
      w("ROM ");const R=out.length;u(0);
      w("RID ");w(r.rid);
      w("RTYP");u(r.rtyp);
      w("RLOG");u(r.rlog);
      w("RPHY");u(r.rphy);
      w("RDT ");out.push(...r.rdt);
      const l=out.length-R-4;
      out[R]=l&255;out[R+1]=l>>8&255;out[R+2]=l>>16&255;out[R+3]=l>>24&255;
    });
    const l=out.length-L-4;
    out[L]=l&255;out[L+1]=l>>8&255;out[L+2]=l>>16&255;out[L+3]=l>>24&255;
  });
  const tl=out.length-8;
  out[4]=tl&255;out[5]=tl>>8&255;out[6]=tl>>16&255;out[7]=tl>>24&255;

  const b=new Blob([new Uint8Array(out)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download=exportNameInput.value+".cro";
  a.click();
}

renderGroups();
</script>
</body>
</html>
