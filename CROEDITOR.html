<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur CRO Avancé</title>
<style>
body { font-family: sans-serif; margin: 2em; }
button { padding: 0.3em 0.8em; margin: 0.2em; }
.group, .rom { margin-bottom: 0.5em; }
.rom { display:block; padding:0.2em 0.5em; border-radius:4px; margin-left:1em; }
.ROM_LOW { background-color:#ffcccc; }
.ROM_HIGH { background-color:#cce5ff; }
.ROM_BANKABLE { background-color:#ccffcc; }
#dropCRO, #dropROM { border:2px dashed #666; padding:2em; text-align:center; margin-bottom:1em; cursor:pointer; }
#dropCRO.dragover, #dropROM.dragover { border-color:#09f; background:#eef; }
</style>
</head>
<body>

<h1>Éditeur CRO Avancé</h1>

<button id="addGroupBtn">Ajouter un GRRO</button>
<button id="importCPRBtn">Importer un CPR/XPR</button>
<button id="exportBtn" disabled>Exporter le CRO</button>

<div id="dropCRO">Déposez un fichier .CRO ici pour l’ouvrir</div>
<div id="groupsContainer"></div>
<div id="dropROM">Déposez des fichiers ROM ici pour ajouter au dernier GRRO</div>

<script>
let groups = [];
let croFileName = "new.cro";

/******** RIFF Helper ********/
function writeUint32LE(buf, offset, value){ buf[offset]=value&0xFF; buf[offset+1]=(value>>8)&0xFF; buf[offset+2]=(value>>16)&0xFF; buf[offset+3]=(value>>24)&0xFF; }
function encodeChunk(id,data){
    const size = data.byteLength;
    const padding = size&1?1:0;
    const buf = new Uint8Array(8+size+padding);
    for(let i=0;i<4;i++) buf[i]=id.charCodeAt(i);
    writeUint32LE(buf,4,size);
    buf.set(new Uint8Array(data),8);
    if(padding) buf[buf.length-1]=0;
    return buf;
}
function encodeROM(rom){
    const chunks=[];
    chunks.push(encodeChunk("RID ",new TextEncoder().encode(rom.rid)));
    const rtypBuf = new Uint8Array(4); writeUint32LE(rtypBuf,0,rom.rtyp); chunks.push(encodeChunk("RTYP",rtypBuf));
    chunks.push(encodeChunk("RLOG",new Uint8Array([rom.rlog])));
    chunks.push(encodeChunk("RPHY",new Uint8Array([rom.rphy])));
    chunks.push(encodeChunk("RDT ",rom.rdt || new Uint8Array()));
    let total=0; chunks.forEach(c=>total+=c.byteLength);
    const data=new Uint8Array(total); let off=0; chunks.forEach(c=>{ data.set(c,off); off+=c.byteLength; });
    return encodeChunk("ROM ",data);
}
function encodeGRRO(grro){
    const romChunks = grro.roms.map(encodeROM);
    let len=0; romChunks.forEach(c=>len+=c.byteLength);
    const buf = new Uint8Array(len); let off=0; romChunks.forEach(c=>{ buf.set(c,off); off+=c.byteLength; });
    const gnumBuf = new Uint8Array(4); writeUint32LE(gnumBuf,0,grro.gnum);
    const gnumChunk = encodeChunk("GNUM",gnumBuf);
    const glblChunk = encodeChunk("GLBL",new TextEncoder().encode(grro.glbl));
    const grroContent = new Uint8Array(gnumChunk.byteLength + glblChunk.byteLength + buf.byteLength);
    grroContent.set(gnumChunk,0); grroContent.set(glblChunk,gnumChunk.byteLength); grroContent.set(buf,gnumChunk.byteLength+glblChunk.byteLength);
    return encodeChunk("GRRO",grroContent);
}
function exportCRO(){
    const grroChunks = groups.map(encodeGRRO);
    let total=0; grroChunks.forEach(c=>total+=c.byteLength);
    const allBuf=new Uint8Array(total);
    let off=0; grroChunks.forEach(c=>{ allBuf.set(c,off); off+=c.byteLength; });
    const riffBuf = new Uint8Array(12+allBuf.byteLength);
    riffBuf.set([82,73,70,70],0); // RIFF
    writeUint32LE(riffBuf,4,allBuf.byteLength+4);
    riffBuf.set([67,82,79,32],8); // CRO
    riffBuf.set(allBuf,12);
    const blob = new Blob([riffBuf.buffer],{type:"application/octet-stream"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = croFileName;
    a.click();
}

/******** UI ********/
const groupsContainer = document.getElementById("groupsContainer");
function renderGroups(){
    groupsContainer.innerHTML="";
    groups.forEach((g,gi)=>{
        const gDiv = document.createElement("div"); gDiv.className="group";
        gDiv.innerHTML=`<b>GRRO 
            <input type="number" min="0" value="${g.gnum}" data-group="${gi}" class="gnumInput" style="width:50px;">
            - <input value="${g.glbl}" data-group="${gi}" class="glblInput">
        </b>
        <button data-group="${gi}" class="delGroupBtn">Supprimer GRRO</button>
        <button data-group="${gi}" class="addROMBtn">Ajouter ROM</button>`;
        g.roms.forEach((r,ri)=>{
            const romDiv = document.createElement("div"); romDiv.className="rom";
            romDiv.classList.add(r.rtyp===0? "ROM_LOW": r.rtyp===1?"ROM_HIGH":"ROM_BANKABLE");
            romDiv.innerHTML=`
                Nom: <input value="${r.rid}" data-group="${gi}" data-rom="${ri}" class="ridInput">
                Type: <select data-group="${gi}" data-rom="${ri}" class="typeSelect">
                    <option value="0"${r.rtyp===0?" selected":""}>ROM_LOW</option>
                    <option value="1"${r.rtyp===1?" selected":""}>ROM_HIGH</option>
                    <option value="2"${r.rtyp===2?" selected":""}>ROM_BANKABLE</option>
                </select>
                Log: <input type="number" min="0" max="255" value="${r.rlog}" data-group="${gi}" data-rom="${ri}" class="rlogInput" style="width:50px;">
                Phys: <input type="number" min="0" max="255" value="${r.rphy}" data-group="${gi}" data-rom="${ri}" class="rphyInput" style="width:50px;">
                Taille: ${r.rdt ? r.rdt.byteLength : 0} octets
                <button data-group="${gi}" data-rom="${ri}" class="delROMBtn">Supprimer ROM</button>
            `;
            gDiv.appendChild(romDiv);
        });
        groupsContainer.appendChild(gDiv);
    });
}

/******** Gestion boutons et inputs ********/
document.getElementById("addGroupBtn").addEventListener("click", ()=>{
    const gnum = groups.length;
    groups.push({ gnum, glbl:`GRRO ${gnum}`, roms:[] });
    renderGroups(); exportBtn.disabled=false;
});

groupsContainer.addEventListener("click", e=>{
    const g = e.target.dataset.group, r = e.target.dataset.rom;
    if(e.target.classList.contains("delGroupBtn")){
        groups.splice(g,1); groups.forEach((gr,i)=>gr.gnum=i); renderGroups();
    }
    if(e.target.classList.contains("addROMBtn")){
        groups[g].roms.push({ rid:"NEW", rtyp:2, rlog:0, rphy:0, rdt:new Uint8Array() });
        renderGroups();
    }
    if(e.target.classList.contains("delROMBtn")){
        groups[g].roms.splice(r,1); renderGroups();
    }
});
groupsContainer.addEventListener("change", e=>{
    const g = e.target.dataset.group, r = e.target.dataset.rom;
    if(e.target.classList.contains("glblInput")) groups[g].glbl=e.target.value;
    if(e.target.classList.contains("gnumInput")) groups[g].gnum=parseInt(e.target.value);
    if(e.target.classList.contains("ridInput")) groups[g].roms[r].rid=e.target.value;
    if(e.target.classList.contains("typeSelect")) groups[g].roms[r].rtyp=parseInt(e.target.value);
    if(e.target.classList.contains("rlogInput")) groups[g].roms[r].rlog=parseInt(e.target.value);
    if(e.target.classList.contains("rphyInput")) groups[g].roms[r].rphy=parseInt(e.target.value);
});

const exportBtn = document.getElementById("exportBtn");
exportBtn.addEventListener("click", exportCRO);

/******** Drag'n'drop CRO existant ********/
const dropCRO = document.getElementById("dropCRO");
dropCRO.addEventListener("dragover", e=>{ e.preventDefault(); dropCRO.classList.add("dragover"); });
dropCRO.addEventListener("dragleave", e=>{ dropCRO.classList.remove("dragover"); });
dropCRO.addEventListener("drop", e=>{
    e.preventDefault(); dropCRO.classList.remove("dragover");
    const file = e.dataTransfer.files[0]; if(!file) return;
    croFileName=file.name;
    const reader = new FileReader();
    reader.onload = ()=>{
        try{
            const buffer = reader.result;
            const riff = parseRIFF(buffer);
            groups = parseCROtoGroups(riff);
            renderGroups(); exportBtn.disabled=false;
        }catch(ex){ alert("Erreur chargement CRO : "+ex); }
    };
    reader.readAsArrayBuffer(file);
});

/******** Drag'n'drop ROMs ********/
const dropROM = document.getElementById("dropROM");
dropROM.addEventListener("dragover", e=>{ e.preventDefault(); dropROM.classList.add("dragover"); });
dropROM.addEventListener("dragleave", e=>{ dropROM.classList.remove("dragover"); });
dropROM.addEventListener("drop", e=>{
    e.preventDefault(); dropROM.classList.remove("dragover");
    if(groups.length===0){ alert("Créez un GRRO d'abord"); return; }
    const grro = groups[groups.length-1];
    Array.from(e.dataTransfer.files).forEach(file=>{
        const reader = new FileReader();
        reader.onload = ()=>{
            grro.roms.push({ rid:file.name, rtyp:2, rlog:0, rphy:0, rdt:new Uint8Array(reader.result) });
            renderGroups();
        };
        reader.readAsArrayBuffer(file);
    });
});

/******** Parser CRO simplifié ********/
function readFourCC(view, offset){return String.fromCharCode(view.getUint8(offset),view.getUint8(offset+1),view.getUint8(offset+2),view.getUint8(offset+3));}
function parseRIFF(buffer){
    const view=new DataView(buffer);
    if(readFourCC(view,0)!="RIFF") throw "Pas RIFF";
    const formType = readFourCC(view,8);
    let offset=12,chunks=[];
    while(offset<buffer.byteLength){
        const id=readFourCC(view,offset);
        const size=view.getUint32(offset+4,true);
        const dataOffset=offset+8;
        chunks.push({id,size,data:buffer.slice(dataOffset,dataOffset+size)});
        offset=dataOffset+size+(size&1);
    }
    return { formType, chunks };
}
function parseCROtoGroups(riff){
    const groupsOut=[];
    riff.chunks.forEach(gr=>{
        if(gr.id==="GRRO"){
            let gnum=0, glbl="";
            const view = new DataView(gr.data);
            let offset=0;
            while(offset<view.byteLength){
                const id=readFourCC(view,offset);
                const size=view.getUint32(offset+4,true);
                const dataOffset=offset+8;
                if(id==="GNUM") gnum=new DataView(gr.data).getUint32(offset+8,true);
                if(id==="GLBL") glbl=new TextDecoder().decode(gr.data.slice(offset+8,offset+8+size));
                offset=dataOffset+size+(size&1);
            }
            groupsOut.push({ gnum, glbl, roms:[] });
        }
    });
    return groupsOut;
}

/******** Import CPR/XPR avec mapping logique corrigé ********/
document.getElementById("importCPRBtn").addEventListener("click", ()=>{
    const inp = document.createElement("input"); inp.type="file"; inp.accept=".cpr,.xpr";
    inp.onchange = ()=>{
        const file = inp.files[0]; if(!file) return;
        croFileName = file.name.replace(/\.(cpr|xpr)$/i,".cro");
        const reader = new FileReader();
        reader.onload = ()=>{
            try{
                const buffer = reader.result;
                const riff = parseRIFF(buffer);
                const parsed = parseCartridge(riff);
                const gnum = groups.length;
                const roms = parsed.roms.map(r=>{
                    let rlog;
                    if(parsed.type==="AMS!" && r.num===3) rlog=7;
                    else if(parsed.type==="AMS!") rlog=1;
                    else rlog=r.num;
                    return { rid:`cb${String(r.num).padStart(2,'0')}`, rtyp:2, rlog, rphy:r.num, rdt:r.data };
                });
                groups.push({ gnum, glbl:`Import ${file.name}`, roms });
                renderGroups(); exportBtn.disabled=false;
            }catch(ex){ alert("Erreur import : "+ex); }
        };
        reader.readAsArrayBuffer(file);
    };
    inp.click();
});

function parseCartridge(riff){
  let nbbk=null; const roms=[];
  for(const c of riff.chunks){
    if(c.id=="NBBK") nbbk=new DataView(c.data).getUint16(0,true);
    if(c.id.startsWith("cb")) roms.push({num:parseInt(c.id.substring(2),10),data:c.data});
  }
  return {type:riff.formType, nbbk, roms};
}
</script>
</body>
</html>
