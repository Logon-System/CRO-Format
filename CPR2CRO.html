<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CPR/XPR → CRO</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  #dropzone {
    border: 2px dashed #666;
    padding: 3em;
    text-align: center;
    margin-bottom: 1em;
    cursor: pointer;
  }
  #dropzone.dragover { border-color: #09f; background: #eef; }
  pre { background: #f5f5f5; padding: 1em; border: 1px solid #ccc; overflow-x: auto; }
  button { padding: 0.5em 1em; font-size: 1em; margin-bottom: 1em; }
  .group { margin-bottom: 1em; }
  .rom { 
    display: block;          /* <=== chaque ROM sur une ligne */
    padding: 0.2em 0.5em;
    border-radius: 4px; 
    margin: 2px 0;           /* espace entre lignes */
  }
  .ROM_LOW { background-color: #ffcccc; }       /* rouge clair */
  .ROM_HIGH { background-color: #cce5ff; }      /* bleu clair */
  .ROM_BANKABLE { background-color: #ccffcc; }  /* vert clair */
</style>
</head>
<body>

<h1>CPR/XPR → CRO</h1>
<div id="dropzone">Déposez un fichier CPR ou XPR ici</div>
<pre id="info">Aucune ROM chargée</pre>
<div id="groups"></div>
<button id="export" disabled>Télécharger le CRO</button>

<script>
/******** RIFF Helper ********/
function readFourCC(view, offset) {
  return String.fromCharCode(
    view.getUint8(offset),
    view.getUint8(offset+1),
    view.getUint8(offset+2),
    view.getUint8(offset+3)
  );
}

function parseRIFF(buffer) {
  const view = new DataView(buffer);
  if(readFourCC(view,0) !== "RIFF") throw "Pas un fichier RIFF valide";
  const formType = readFourCC(view,8);
  let offset = 12;
  const chunks = [];
  while(offset < buffer.byteLength) {
    const id = readFourCC(view, offset);
    const size = view.getUint32(offset+4,true);
    const dataOffset = offset + 8;
    chunks.push({
      id,
      size,
      data: buffer.slice(dataOffset, dataOffset+size)
    });
    offset = dataOffset + size + (size & 1); // padding pair
  }
  return { formType, chunks };
}

/******** Parse CPR/XPR ********/
function parseCartridge(riff) {
  let nbbk = null;
  const roms = [];
  for(const c of riff.chunks) {
    if(c.id === "NBBK") {
      nbbk = new DataView(c.data).getUint16(0,true);
      if(nbbk>32) throw "NBBK invalide (>32)";
    }
    if(c.id.startsWith("cb")) {
      const num = parseInt(c.id.substring(2),10);
      if(num>99) throw "Numéro de ROM cb>99 invalide";
      roms.push({ num, data: c.data });
    }
  }
  return { type: riff.formType, nbbk, roms };
}

/******** Génération CRO ********/
function createCRO(parsed) {
  const groups = [];
  const nbbk = parsed.nbbk || parsed.roms.length;
  const numGroups = Math.ceil(parsed.roms.length / nbbk);

  const logicalMapCPR = { 0:0, 1:1, 3:7 };

  for(let i=0;i<numGroups;i++){
    const grro = {
      gnum: i,
      glbl: parsed.type==="CXME"?`XPR group ${i}`:"CPR cartridge",
      roms: []
    };
    const start = i*nbbk;
    const end = Math.min((i+1)*nbbk, parsed.roms.length);
    for(let j=start;j<end;j++){
      const r = parsed.roms[j];
      const rlog = parsed.type==="AMS!" ? (logicalMapCPR[r.num] ?? r.num) : r.num;
      grro.roms.push({
        rid:`cb${String(r.num).padStart(2,'0')}`,
        rtyp:0x02, // ROM_BANKABLE
        rlog:rlog,
        rphy:r.num,
        rdt:r.data
      });
    }
    groups.push(grro);
  }

  function writeUint32LE(buf, offset, value){ buf[offset]=value&0xFF; buf[offset+1]=(value>>8)&0xFF; buf[offset+2]=(value>>16)&0xFF; buf[offset+3]=(value>>24)&0xFF; }
  function encodeChunk(id,data){
    const size = data.byteLength;
    const padding = size&1?1:0;
    const buf = new Uint8Array(8+size+padding);
    for(let i=0;i<4;i++) buf[i]=id.charCodeAt(i);
    writeUint32LE(buf,4,size);
    buf.set(new Uint8Array(data),8);
    if(padding) buf[buf.length-1]=0;
    return buf;
  }

  function encodeROM(rom){
    const chunks=[];
    chunks.push(encodeChunk("RID ",new TextEncoder().encode(rom.rid)));
    const rtypBuf = new Uint8Array(4); writeUint32LE(rtypBuf,0,rom.rtyp); chunks.push(encodeChunk("RTYP",rtypBuf));
    chunks.push(encodeChunk("RLOG",new Uint8Array([rom.rlog])));
    chunks.push(encodeChunk("RPHY",new Uint8Array([rom.rphy])));
    chunks.push(encodeChunk("RDT ",rom.rdt));
    let total=0; chunks.forEach(c=>total+=c.byteLength);
    const data=new Uint8Array(total); let off=0; chunks.forEach(c=>{ data.set(c,off); off+=c.byteLength; });
    return encodeChunk("ROM ",data);
  }

  const grroChunks = groups.map(g=>{
    const romData = g.roms.map(encodeROM);
    let len=0; romData.forEach(c=>len+=c.byteLength);
    const buf = new Uint8Array(len);
    let off=0; romData.forEach(c=>{ buf.set(c,off); off+=c.byteLength; });
    const gnumBuf = new Uint8Array(4); writeUint32LE(gnumBuf,0,g.gnum);
    const glblData = new TextEncoder().encode(g.glbl);
    const gnumChunk = encodeChunk("GNUM",gnumBuf);
    const glblChunk = encodeChunk("GLBL",glblData);
    const grroContent = new Uint8Array(gnumChunk.byteLength+glblChunk.byteLength+buf.byteLength);
    grroContent.set(gnumChunk,0);
    grroContent.set(glblChunk,gnumChunk.byteLength);
    grroContent.set(buf,gnumChunk.byteLength+glblChunk.byteLength);
    return encodeChunk("GRRO",grroContent);
  });

  let total=0; grroChunks.forEach(c=>total+=c.byteLength);
  const allBuf=new Uint8Array(total);
  let off=0; grroChunks.forEach(c=>{ allBuf.set(c,off); off+=c.byteLength; });

  const riffBuf = new Uint8Array(12+allBuf.byteLength);
  riffBuf.set([82,73,70,70],0);
  writeUint32LE(riffBuf,4,allBuf.byteLength+4);
  riffBuf.set([67,82,79,32],8);
  riffBuf.set(allBuf,12);
  return riffBuf.buffer;
}

/******** UI ********/
const dropzone = document.getElementById("dropzone");
const info = document.getElementById("info");
const groupsDiv = document.getElementById("groups");
const exportBtn = document.getElementById("export");
let croBuffer=null;
let croFileName="converted.cro";

dropzone.addEventListener("dragover", e=>{ e.preventDefault(); dropzone.classList.add("dragover"); });
dropzone.addEventListener("dragleave", e=>{ dropzone.classList.remove("dragover"); });
dropzone.addEventListener("drop", e=>{
  e.preventDefault(); dropzone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> {
    try {
      const buffer = reader.result;
      const riff = parseRIFF(buffer);
      const parsed = parseCartridge(riff);
      info.textContent = `Type : ${parsed.type}\nROMs : ${parsed.roms.length}` +
        (parsed.nbbk?`\nROMs par groupe : ${parsed.nbbk}`:'');
      croBuffer = createCRO(parsed);
      exportBtn.disabled=false;

      croFileName = file.name.replace(/\.(cpr|xpr)$/i,".cro");

      groupsDiv.innerHTML = "";
      const nbbk = parsed.nbbk || parsed.roms.length;
      const numGroups = Math.ceil(parsed.roms.length / nbbk);
      const logicalMapCPR = {0:0,1:1,3:7};
      for(let i=0;i<numGroups;i++){
        const groupDiv = document.createElement("div");
        groupDiv.className="group";
        const start=i*nbbk;
        const end=Math.min((i+1)*nbbk, parsed.roms.length);
        groupDiv.innerHTML=`<b>GRRO ${i}</b> - ${parsed.type==="CXME"?"XPR group":"CPR cartridge"}`;
        for(let j=start;j<end;j++){
          const r = parsed.roms[j];
          const rlog = parsed.type==="AMS!" ? (logicalMapCPR[r.num] ?? r.num) : r.num;
          const romDiv = document.createElement("div");
          romDiv.className="rom ROM_BANKABLE";
          romDiv.textContent = `${r.rid || `cb${String(r.num).padStart(2,'0')}`} - Phys: ${r.num}, Log: ${rlog}, Taille: ${r.data.byteLength} octets`;
          // couleur selon type
          if(r.rtyp===0x00) romDiv.className="rom ROM_LOW";
          else if(r.rtyp===0x01) romDiv.className="rom ROM_HIGH";
          else romDiv.className="rom ROM_BANKABLE";
          groupDiv.appendChild(romDiv);
        }
        groupsDiv.appendChild(groupDiv);
      }

    } catch(ex) {
      info.textContent = "Erreur : "+ex;
      groupsDiv.innerHTML="";
      croBuffer=null;
      exportBtn.disabled=true;
    }
  };
  reader.readAsArrayBuffer(file);
});

exportBtn.addEventListener("click", ()=>{
  if(!croBuffer) return;
  const blob = new Blob([croBuffer],{type:"application/octet-stream"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=croFileName;
  a.click();
});
</script>

</body>
</html>
